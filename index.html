<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Card for Mom 💐</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font-serif: 'Lora', Georgia, serif;
  --font-sans: 'DM Sans', system-ui, sans-serif;
  --pink: #E8638C;
  --pink-light: #FDE8F0;
  --pink-dark: #C04070;
  --purple: #7C6FCD;
  --radius: 20px;
  --shadow: 0 8px 40px rgba(0,0,0,0.10);
}

body {
  font-family: var(--font-sans);
  min-height: 100vh;
  background: #fdf8fa;
  color: #2a1a22;
  overflow-x: hidden;
}

/* ── SCREEN SYSTEM ─────────────────────────────────────────────────────── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ── PROGRESS BAR ──────────────────────────────────────────────────────── */
.progress-bar {
  height: 3px;
  background: rgba(0,0,0,0.08);
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
}
.progress-fill {
  height: 100%;
  background: var(--pink);
  transition: width 0.4s ease;
  border-radius: 0 2px 2px 0;
}

/* ── QUESTION SCREEN ───────────────────────────────────────────────────── */
.q-screen {
  display: flex;
  flex-direction: column;
  padding: 60px 24px 100px;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  transition: background 0.5s ease;
  position: relative;
}

.q-inner { max-width: 560px; width: 100%; }

.q-title {
  font-family: var(--font-serif);
  font-size: clamp(1.5rem, 4vw, 2rem);
  font-weight: 400;
  line-height: 1.3;
  color: #1a0e18;
  margin-bottom: 1.75rem;
  display: flex; align-items: flex-start; gap: 12px;
}
.q-emoji { font-size: 1.5rem; flex-shrink: 0; margin-top: 2px; }

/* ── SUGGESTION BUBBLES ────────────────────────────────────────────────── */
.suggestions { margin-bottom: 1rem; display: flex; flex-direction: column; gap: 10px; }

.bubble {
  padding: 14px 20px;
  border-radius: 18px 18px 18px 4px;
  font-size: 0.95rem;
  line-height: 1.55;
  color: #2a1a22;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  border: 1.5px solid transparent;
}
.bubble:nth-child(2) { border-radius: 18px 18px 4px 18px; align-self: flex-end; max-width: 85%; }
.bubble:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
.bubble.selected { border-color: currentColor; font-weight: 500; }

/* ── TEXTAREA ──────────────────────────────────────────────────────────── */
.q-textarea-wrap { position: relative; margin-top: 0.5rem; }
.q-textarea {
  width: 100%;
  padding: 16px 20px;
  border: 1.5px solid rgba(0,0,0,0.12);
  border-radius: 14px;
  font-family: var(--font-serif);
  font-size: 0.95rem;
  line-height: 1.6;
  color: #2a1a22;
  background: rgba(255,255,255,0.7);
  resize: none;
  min-height: 100px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  backdrop-filter: blur(4px);
}
.q-textarea:focus { border-color: var(--pink); box-shadow: 0 0 0 3px rgba(232,99,140,0.15); }
.q-textarea::placeholder { color: rgba(0,0,0,0.3); font-style: italic; }

/* ── PHOTO UPLOAD (in questions) ───────────────────────────────────────── */
.photo-upload-zone {
  margin-top: 1rem;
  border: 2px dashed rgba(0,0,0,0.15);
  border-radius: 14px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(255,255,255,0.5);
}
.photo-upload-zone:hover { border-color: var(--pink); background: rgba(232,99,140,0.04); }
.photo-upload-zone p { font-size: 0.88rem; color: rgba(0,0,0,0.45); }
.photo-upload-zone span { font-size: 1.6rem; display: block; margin-bottom: 6px; }
.photo-input { display: none; }

.photo-thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.photo-thumb-wrap {
  position: relative; width: 72px; height: 72px;
  border-radius: 10px; overflow: hidden;
  border: 2px solid rgba(232,99,140,0.3);
  flex-shrink: 0;
}
.photo-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }
.remove-thumb {
  position: absolute; top: 2px; right: 2px;
  width: 18px; height: 18px;
  background: rgba(0,0,0,0.55); color: white;
  border: none; border-radius: 50%; cursor: pointer;
  font-size: 12px; line-height: 18px; text-align: center;
  display: none; align-items: center; justify-content: center;
  padding: 0;
}
.photo-thumb-wrap:hover .remove-thumb { display: flex; }

/* ── NAV BUTTONS ───────────────────────────────────────────────────────── */
.nav-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; gap: 0;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(0,0,0,0.06);
  z-index: 50;
}
.nav-btn {
  flex: 1; padding: 18px;
  border: none; background: transparent;
  font-family: var(--font-sans); font-size: 0.95rem;
  cursor: pointer; color: rgba(0,0,0,0.45);
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.nav-btn.primary {
  background: var(--pink); color: white; font-weight: 500;
}
.nav-btn.primary:hover { background: var(--pink-dark); }
.nav-btn.back-btn:hover { color: rgba(0,0,0,0.8); background: rgba(0,0,0,0.04); }
.nav-btn.skip-btn { color: var(--purple); font-weight: 500; }
.nav-btn.skip-btn:hover { background: rgba(124,111,205,0.06); }
.nav-btn:disabled { opacity: 0.35; cursor: not-allowed; background: rgba(0,0,0,0.06) !important; color: rgba(0,0,0,0.3) !important; }

/* ── DESIGN PICKER ─────────────────────────────────────────────────────── */
#screen-design {
  background: linear-gradient(160deg, #f5eef8 0%, #fdf0f4 100%);
  align-items: center; justify-content: center;
  padding: 60px 24px 100px;
}
.design-inner { max-width: 560px; width: 100%; }
.design-inner h2 {
  font-family: var(--font-serif); font-size: 1.8rem; font-weight: 400;
  text-align: center; margin-bottom: 2rem; color: #1a0e18;
}

.design-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.design-card {
  border-radius: 14px; overflow: hidden;
  border: 2.5px solid transparent;
  cursor: pointer; transition: all 0.2s;
  background: white;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
}
.design-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.13); }
.design-card.selected { border-color: var(--pink); box-shadow: 0 0 0 4px rgba(232,99,140,0.15); }
.design-preview {
  height: 120px; width: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem;
}
.design-name {
  padding: 8px 10px; text-align: center;
  font-size: 0.82rem; color: #2a1a22; font-weight: 500;
  border-top: 1px solid rgba(0,0,0,0.06);
}
.design-nav { margin-top: 2rem; display: flex; justify-content: center; }
.btn-continue {
  padding: 14px 40px;
  background: var(--pink); color: white;
  border: none; border-radius: 50px;
  font-family: var(--font-sans); font-size: 1rem; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
}
.btn-continue:hover { background: var(--pink-dark); transform: translateY(-1px); }
.btn-continue:disabled { background: rgba(0,0,0,0.15); color: rgba(0,0,0,0.3); cursor: not-allowed; transform: none; }

/* Design preview palettes */
.dp-roses .design-preview { background: linear-gradient(135deg, #ffe0ec, #ffc2d4); }
.dp-golden .design-preview { background: linear-gradient(135deg, #fff4d6, #ffe5a0); }
.dp-garden .design-preview { background: linear-gradient(135deg, #e0f5e9, #b8e6c6); }
.dp-ocean .design-preview { background: linear-gradient(135deg, #dbeeff, #b8d9ff); }
.dp-lavender .design-preview { background: linear-gradient(135deg, #ede5ff, #d4c4ff); }
.dp-sunset .design-preview { background: linear-gradient(135deg, #ffe5d6, #ffbf9b); }

/* ── CARD VIEWER ───────────────────────────────────────────────────────── */
#screen-view {
  min-height: 100vh;
  align-items: center; justify-content: center;
  padding: 20px 16px 80px;
  background: #f5f0f8;
}

.card-stage { position: relative; width: 100%; max-width: 480px; }

.memo-card {
  background: white;
  border-radius: 24px;
  box-shadow: 0 12px 60px rgba(0,0,0,0.13);
  overflow: hidden;
  min-height: 420px;
  display: flex; flex-direction: column;
  position: relative;
}

/* Cover slide */
.card-cover {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 3rem 2rem;
  text-align: center;
  position: relative; overflow: hidden;
}
.card-cover-bg {
  position: absolute; inset: 0;
  z-index: 0;
}
.card-cover-content { position: relative; z-index: 1; }
.card-cover .to-label {
  font-family: var(--font-sans);
  font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 0.5rem; opacity: 0.6;
}
.card-cover .to-name {
  font-family: var(--font-serif); font-size: 2.2rem;
  font-weight: 400; line-height: 1.2; margin-bottom: 1.5rem;
}
.card-cover .tap-hint {
  font-size: 0.85rem; opacity: 0.55;
  display: flex; align-items: center; gap: 6px;
  justify-content: center;
}
.tap-pulse {
  width: 8px; height: 8px; border-radius: 50%;
  background: currentColor; animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.3); }
}

/* Inner slides */
.card-slide {
  flex: 1; display: flex; flex-direction: column;
  min-height: 420px;
}
.slide-question {
  padding: 2rem 2rem 1rem;
  font-family: var(--font-serif); font-size: 1.05rem;
  font-style: italic; color: rgba(0,0,0,0.45);
  border-bottom: 1px solid rgba(0,0,0,0.05);
}
.slide-answer-area {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem;
  cursor: pointer;
}
.slide-answer {
  font-family: var(--font-serif); font-size: 1.2rem;
  line-height: 1.7; text-align: center; color: #1a0e18;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.slide-answer.revealed { opacity: 1; transform: translateY(0); }
.slide-photos {
  display: flex; gap: 8px; overflow-x: auto;
  padding: 0 1.5rem 1.5rem;
  opacity: 0; transition: opacity 0.4s ease 0.2s;
}
.slide-photos.revealed { opacity: 1; }
.slide-photos img {
  height: 120px; width: auto; min-width: 90px; max-width: 180px;
  border-radius: 10px; object-fit: cover; flex-shrink: 0;
}

.tap-reveal {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  color: rgba(0,0,0,0.3);
  transition: opacity 0.3s;
}
.tap-reveal.hidden { opacity: 0; pointer-events: none; }
.tap-reveal-icon { font-size: 2rem; }
.tap-reveal-text { font-size: 0.88rem; }

/* Card nav */
.card-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; gap: 8px;
  padding: 12px 16px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(0,0,0,0.06);
  z-index: 50; align-items: center;
}
.card-nav-btn {
  flex: 1; padding: 12px;
  border: 1.5px solid rgba(0,0,0,0.12);
  background: white; border-radius: 50px;
  font-family: var(--font-sans); font-size: 0.9rem;
  cursor: pointer; color: rgba(0,0,0,0.5);
  transition: all 0.2s;
}
.card-nav-btn:hover { border-color: rgba(0,0,0,0.3); color: #1a0e18; }
.card-nav-btn.next-btn {
  background: var(--pink); color: white; border-color: var(--pink); font-weight: 500;
}
.card-nav-btn.next-btn:hover { background: var(--pink-dark); border-color: var(--pink-dark); }
.card-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.card-dots {
  display: flex; gap: 5px; align-items: center; justify-content: center;
  flex: 0 0 auto; padding: 0 4px;
}
.card-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(0,0,0,0.15); transition: all 0.2s;
}
.card-dot.active { background: var(--pink); transform: scale(1.3); }

.card-util { display: flex; gap: 8px; justify-content: center; margin-top: -48px; position: relative; z-index: 60; padding-bottom: 8px; }
.util-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: white; border: 1px solid rgba(0,0,0,0.1);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  transition: all 0.2s;
}
.util-btn:hover { transform: scale(1.08); box-shadow: 0 4px 16px rgba(0,0,0,0.13); }

/* ── SHARE SECTION ─────────────────────────────────────────────────────── */
#share-wrap {
  display: none;
  max-width: 480px; width: 100%; margin-top: 1rem;
  background: white; border-radius: 16px; padding: 1.25rem;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  text-align: center;
}
#share-wrap h3 {
  font-family: var(--font-serif); font-weight: 400; font-size: 1.1rem;
  margin-bottom: 0.35rem; color: #1a0e18;
}
#share-wrap p { font-size: 0.82rem; color: rgba(0,0,0,0.45); margin-bottom: 0.9rem; }
.share-row { display: flex; gap: 6px; }
.share-row input {
  flex: 1; padding: 9px 12px; border: 1px solid rgba(0,0,0,0.12);
  border-radius: 8px; font-size: 0.82rem; font-family: var(--font-sans);
  color: rgba(0,0,0,0.6); background: #fafafa; outline: none;
}
.share-copy-btn {
  padding: 9px 16px; background: var(--pink); color: white;
  border: none; border-radius: 8px; font-family: var(--font-sans);
  font-size: 0.82rem; font-weight: 500; cursor: pointer; white-space: nowrap;
  transition: background 0.15s;
}
.share-copy-btn:hover { background: var(--pink-dark); }
.share-copy-btn.ok { background: #2d7d46; }
.made-link { display: block; text-align: center; margin-top: 1rem; font-size: 0.78rem; color: rgba(0,0,0,0.35); }

/* ── TOAST ─────────────────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(0,0,0,0.8); color: white;
  padding: 10px 20px; border-radius: 50px;
  font-size: 0.88rem; font-family: var(--font-sans);
  opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 200;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── THEME OVERRIDES FOR CARD ──────────────────────────────────────────── */
.theme-roses { --card-accent: #E8638C; --card-bg: linear-gradient(135deg, #ffeef5, #ffd6e6); }
.theme-golden { --card-accent: #C8880A; --card-bg: linear-gradient(135deg, #fff8e1, #ffedb0); }
.theme-garden { --card-accent: #2D8A4E; --card-bg: linear-gradient(135deg, #e6f7ec, #c0e8ce); }
.theme-ocean  { --card-accent: #1A6BB5; --card-bg: linear-gradient(135deg, #e2f0ff, #b8d5ff); }
.theme-lavender { --card-accent: #6B5CB8; --card-bg: linear-gradient(135deg, #ede5ff, #d0c0ff); }
.theme-sunset { --card-accent: #C05030; --card-bg: linear-gradient(135deg, #fff0e6, #ffd0b0); }

.card-cover .to-name,
.card-cover .to-label { color: var(--card-accent, #E8638C); }
</style>
</head>
<body>

<div class="progress-bar" id="progress-bar" style="display:none;">
  <div class="progress-fill" id="progress-fill" style="width:0%"></div>
</div>

<!-- ── QUESTIONS SCREEN ───────────────────────────────────────────────── -->
<div id="screen-questions" class="screen active">
  <div class="q-screen" id="q-screen">
    <div class="q-inner" id="q-inner"><!-- rendered by JS --></div>
  </div>
  <nav class="nav-bar" id="q-nav">
    <button class="nav-btn back-btn" id="btn-back">← Back</button>
    <button class="nav-btn skip-btn" id="btn-skip">Skip</button>
    <button class="nav-btn primary" id="btn-next">Next →</button>
  </nav>
</div>

<!-- ── DESIGN SCREEN ──────────────────────────────────────────────────── -->
<div id="screen-design" class="screen">
  <div class="design-inner">
    <h2>Pick a card design</h2>
    <div class="design-grid" id="design-grid"></div>
    <div class="design-nav">
      <button class="btn-continue" id="btn-design-continue" disabled>Continue →</button>
    </div>
  </div>
</div>

<!-- ── VIEW SCREEN ────────────────────────────────────────────────────── -->
<div id="screen-view" class="screen" style="flex-direction:column;">
  <div class="card-stage">
    <div class="memo-card" id="memo-card"><!-- rendered --></div>
  </div>
  <div id="share-wrap">
    <h3>Share this card 💌</h3>
    <p>Only someone with this link can open it — it's just for her.</p>
    <div class="share-row">
      <input type="text" id="share-input" readonly>
      <button class="share-copy-btn" id="share-copy">Copy</button>
    </div>
  </div>
  <p class="made-link">Made with ♡ — free & private</p>
  <div class="card-nav" id="card-nav">
    <button class="card-nav-btn" id="cn-prev" disabled>← Prev</button>
    <div class="card-dots" id="card-dots"></div>
    <button class="card-nav-btn next-btn" id="cn-next">Next →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

  {
    id: 'future',
    text: "What do you hope to do together in the future?",
    emoji: '🎯',
    color: '#fff0f5',
    bubbleColor: '#ffd8e8',
    hasPhoto: true,
    suggestions: [
      "Finally take that trip to the Pacific Northwest we always talk about.",
      "Spend a whole weekend baking her old recipes with zero rush."
    ],
    placeholder: 'Add your own moment…'
  }
];

const DESIGNS = [
  { id: 'roses',    label: 'Roses',    emoji: '🌹', cls: 'dp-roses' },
  { id: 'golden',   label: 'Golden',   emoji: '✨', cls: 'dp-golden' },
  { id: 'garden',   label: 'Garden',   emoji: '🌿', cls: 'dp-garden' },
  { id: 'ocean',    label: 'Ocean',    emoji: '🌊', cls: 'dp-ocean' },
  { id: 'lavender', label: 'Lavender', emoji: '💜', cls: 'dp-lavender' },
  { id: 'sunset',   label: 'Sunset',   emoji: '🌅', cls: 'dp-sunset' },
];

// ── STATE ────────────────────────────────────────────────────────────────
let state = {
  step: 0,          // current question index
  answers: {},      // { questionId: string }
  photos: {},       // { questionId: [base64, ...] }
  toName: '',
  fromName: '',
  design: null,
  cardSlide: 0,
  revealedSlides: new Set(),
};

// ── UTILS ────────────────────────────────────────────────────────────────
function uuid() {
  return 'xxxx-xxxx-4xxx-yxxx-xxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg, ms = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}
function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── QUESTION RENDERER ────────────────────────────────────────────────────
function renderQuestion(idx) {
  const isIntro = idx === -1;
  const qs = document.getElementById('q-screen');
  const qInner = document.getElementById('q-inner');
  const total = QUESTIONS.length;

  document.getElementById('progress-bar').style.display = isIntro ? 'none' : 'block';
  const pct = isIntro ? 0 : ((idx + 1) / total) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';

  if (isIntro) {
    qs.style.background = 'linear-gradient(160deg, #fdf0f6 0%, #f0ecff 100%)';
    qInner.innerHTML = `
      <div style="text-align:center; padding-bottom:1rem;">
        <div style="font-size:3.5rem; margin-bottom:1.5rem;">💐</div>
        <h1 style="font-family:var(--font-serif); font-size:2rem; font-weight:400; color:#1a0e18; margin-bottom:0.75rem; line-height:1.3;">
          Make a card for Mom
        </h1>
        <p style="color:rgba(0,0,0,0.5); font-size:0.95rem; line-height:1.6; max-width:380px; margin:0 auto 2rem;">
          Answer a few prompts about her — your words will become a beautiful card she can tap through.
        </p>
        <label style="display:block; text-align:left; font-size:0.8rem; letter-spacing:0.06em; text-transform:uppercase; color:rgba(0,0,0,0.4); margin-bottom:6px;">Her name</label>
        <input type="text" id="to-name-input" placeholder="Mom, Grandma, Nana…" maxlength="50"
          value="${esc(state.toName)}"
          style="width:100%; padding:12px 16px; border:1.5px solid rgba(0,0,0,0.12); border-radius:12px;
          font-family:var(--font-serif); font-size:1rem; color:#1a0e18; background:white; outline:none; margin-bottom:12px;">
        <label style="display:block; text-align:left; font-size:0.8rem; letter-spacing:0.06em; text-transform:uppercase; color:rgba(0,0,0,0.4); margin-bottom:6px;">Your name</label>
        <input type="text" id="from-name-input" placeholder="Your name" maxlength="50"
          value="${esc(state.fromName)}"
          style="width:100%; padding:12px 16px; border:1.5px solid rgba(0,0,0,0.12); border-radius:12px;
          font-family:var(--font-serif); font-size:1rem; color:#1a0e18; background:white; outline:none;">
      </div>`;
    document.getElementById('btn-back').style.visibility = 'hidden';
    document.getElementById('btn-skip').style.display = 'none';
    document.getElementById('btn-next').textContent = 'Start →';
    document.getElementById('btn-next').disabled = false;

    const toInput = document.getElementById('to-name-input');
    const frInput = document.getElementById('from-name-input');
    const checkReady = () => {
      state.toName = toInput.value.trim();
      state.fromName = frInput.value.trim();
      document.getElementById('btn-next').disabled = !(state.toName && state.fromName);
    };
    toInput.addEventListener('input', checkReady);
    frInput.addEventListener('input', checkReady);
    checkReady();
    return;
  }

  const q = QUESTIONS[idx];
  qs.style.background = q.color;
  const existing = state.answers[q.id] || '';
  const thumbsHtml = buildPhotoThumbs(q.id);

  qInner.innerHTML = `
    <div class="q-title">
      <span class="q-emoji">${q.emoji}</span>
      <span>${esc(q.text)}</span>
    </div>
    <div class="suggestions">
      ${q.suggestions.map((s, si) => `
        <div class="bubble" data-idx="${si}" style="background:${q.bubbleColor};">${esc(s)}</div>
      `).join('')}
    </div>
    <div class="q-textarea-wrap">
      <textarea class="q-textarea" id="q-textarea" placeholder="${esc(q.placeholder)}" maxlength="400">${esc(existing)}</textarea>
    </div>
    ${q.hasPhoto ? `
    <div class="photo-upload-zone" id="photo-zone">
      <span>📷</span>
      <p>Tap to add photos for this memory (optional)</p>
      <input type="file" class="photo-input" id="photo-file-input" accept="image/*" multiple>
    </div>
    <div class="photo-thumbs" id="photo-thumbs">${thumbsHtml}</div>
    ` : ''}
  `;

  // Bubble click → populate textarea
  qInner.querySelectorAll('.bubble').forEach(b => {
    b.addEventListener('click', () => {
      const ta = document.getElementById('q-textarea');
      ta.value = b.textContent;
      state.answers[q.id] = ta.value;
      qInner.querySelectorAll('.bubble').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
    });
    if (existing && b.textContent === existing) b.classList.add('selected');
  });

  // Textarea input
  document.getElementById('q-textarea').addEventListener('input', e => {
    state.answers[q.id] = e.target.value;
    qInner.querySelectorAll('.bubble').forEach(bub => {
      bub.classList.toggle('selected', bub.textContent === e.target.value);
    });
  });

  // Photo zone
  if (q.hasPhoto) {
    document.getElementById('photo-zone').addEventListener('click', () => {
      document.getElementById('photo-file-input').click();
    });
    document.getElementById('photo-file-input').addEventListener('change', async e => {
      const files = Array.from(e.target.files);
      const existing = state.photos[q.id] || [];
      const available = 4 - existing.length;
      for (const f of files.slice(0, available)) {
        const b64 = await resizeImg(await toBase64(f));
        if (!state.photos[q.id]) state.photos[q.id] = [];
        state.photos[q.id].push(b64);
      }
      document.getElementById('photo-thumbs').innerHTML = buildPhotoThumbs(q.id);
      bindThumbRemovals(q.id);
      e.target.value = '';
    });
    bindThumbRemovals(q.id);
  }

  document.getElementById('btn-back').style.visibility = 'visible';
  document.getElementById('btn-skip').style.display = '';
  document.getElementById('btn-next').textContent = idx < QUESTIONS.length - 1 ? 'Next →' : 'Pick a design →';
  document.getElementById('btn-next').disabled = false;

  // Count answered for "need 3" gate on last question
  updateNextButton();
}

function updateNextButton() {
  const answered = QUESTIONS.filter(q => (state.answers[q.id] || '').trim()).length;
  const isLast = state.step === QUESTIONS.length - 1;
  const btn = document.getElementById('btn-next');
  if (isLast && answered < 3) {
    btn.textContent = `← Answer at least 3 questions`;
    btn.disabled = true;
  } else if (isLast) {
    btn.textContent = 'Pick a design →';
    btn.disabled = false;
  }
}

function buildPhotoThumbs(qid) {
  const photos = state.photos[qid] || [];
  return photos.map((src, i) => `
    <div class="photo-thumb-wrap" data-idx="${i}">
      <img src="${src}" alt="photo">
      <button class="remove-thumb" data-qid="${qid}" data-i="${i}">×</button>
    </div>`).join('');
}

function bindThumbRemovals(qid) {
  document.querySelectorAll('.remove-thumb').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const i = parseInt(btn.dataset.i);
      state.photos[qid].splice(i, 1);
      document.getElementById('photo-thumbs').innerHTML = buildPhotoThumbs(qid);
      bindThumbRemovals(qid);
    });
  });
}

// ── PHOTO HELPERS ────────────────────────────────────────────────────────
function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
function resizeImg(dataUrl, maxW = 900, maxH = 900, q = 0.82) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxW || h > maxH) {
        const r = Math.min(maxW / w, maxH / h);
        w = Math.round(w * r); h = Math.round(h * r);
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      res(c.toDataURL('image/jpeg', q));
    };
    img.src = dataUrl;
  });
}

// ── NAV ──────────────────────────────────────────────────────────────────
document.getElementById('btn-next').addEventListener('click', () => {
  if (state.step === -1) {
    // intro → first question
    state.step = 0;
    renderQuestion(0);
    return;
  }
  if (state.step < QUESTIONS.length - 1) {
    state.step++;
    renderQuestion(state.step);
  } else {
    // go to design
    showDesignScreen();
  }
});

document.getElementById('btn-back').addEventListener('click', () => {
  if (state.step > 0) { state.step--; renderQuestion(state.step); }
  else { state.step = -1; renderQuestion(-1); }
});

document.getElementById('btn-skip').addEventListener('click', () => {
  if (state.step < QUESTIONS.length - 1) {
    state.step++;
    renderQuestion(state.step);
  }
});

// ── DESIGN SCREEN ────────────────────────────────────────────────────────
function showDesignScreen() {
  switchScreen('screen-design');
  const grid = document.getElementById('design-grid');
  grid.innerHTML = DESIGNS.map(d => `
    <div class="design-card ${d.cls}" data-id="${d.id}">
      <div class="design-preview">${d.emoji}</div>
      <div class="design-name">${d.label}</div>
    </div>`).join('');

  grid.querySelectorAll('.design-card').forEach(card => {
    card.addEventListener('click', () => {
      grid.querySelectorAll('.design-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      state.design = card.dataset.id;
      document.getElementById('btn-design-continue').disabled = false;
    });
  });
}

document.getElementById('btn-design-continue').addEventListener('click', () => {
  if (!state.design) return;
  buildAndShowCard();
});

// ── CARD BUILDER ─────────────────────────────────────────────────────────
function buildAndShowCard() {
  switchScreen('screen-view');
  document.getElementById('progress-bar').style.display = 'none';

  const answeredQs = QUESTIONS.filter(q => (state.answers[q.id] || '').trim());
  state.slides = answeredQs.map(q => ({
    id: q.id,
    question: q.text,
    answer: state.answers[q.id] || '',
    photos: state.photos[q.id] || []
  }));
  state.cardSlide = 0;
  state.revealedSlides = new Set();

  renderCardSlide(0);
  renderDots();
  setupCardNav();

  const card = {
    toName: state.toName, fromName: state.fromName,
    design: state.design, slides: state.slides
  };
  let shareUrl;
  try {
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(card))));
    const base = location.href.split('#')[0].split('?')[0];
    shareUrl = base + '?card=' + encoded;
  } catch(e) {
    shareUrl = 'Could not encode — try fewer/smaller photos.';
  }

  document.getElementById('share-input').value = shareUrl;
  document.getElementById('share-wrap').style.display = 'block';

  const copyBtn = document.getElementById('share-copy');
  const newBtn = copyBtn.cloneNode(true);
  copyBtn.parentNode.replaceChild(newBtn, copyBtn);
  newBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(shareUrl).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = shareUrl; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); ta.remove();
    });
    newBtn.textContent = 'Copied!'; newBtn.classList.add('ok');
    setTimeout(() => { newBtn.textContent = 'Copy'; newBtn.classList.remove('ok'); }, 2000);
  });
}

function renderCardSlide(slideIdx) {
  const card = document.getElementById('memo-card');
  const theme = 'theme-' + (state.design || 'roses');
  card.className = 'memo-card ' + theme;

  if (slideIdx === 0) {
    card.innerHTML = `
      <div class="card-cover">
        <div class="card-cover-bg" style="background:var(--card-bg)"></div>
        <div class="card-cover-content">
          <p class="to-label">A card for</p>
          <p class="to-name">${esc(state.toName)}</p>
          <p class="tap-hint"><span class="tap-pulse"></span> Tap Next to open</p>
        </div>
      </div>`;
  } else {
    const slide = state.slides[slideIdx - 1];
    if (!slide) return;
    const revealed = state.revealedSlides.has(slideIdx);
    const photosArr = slide.photos || [];
    const photosHtml = photosArr.length
      ? `<div class="slide-photos" id="slide-photos" style="opacity:${revealed ? 1 : 0}; transition:opacity 0.4s ease 0.2s;">
          ${photosArr.map(p => `<img src="${p}" alt="photo">`).join('')}
         </div>`
      : '';
    card.innerHTML = `
      <div class="card-slide">
        <div class="slide-question">${esc(slide.question)}</div>
        <div class="slide-answer-area" id="slide-tap-area" style="cursor:pointer;">
          <div class="tap-reveal" id="tap-reveal" style="display:${revealed ? 'none' : 'flex'}; flex-direction:column; align-items:center; gap:10px; color:rgba(0,0,0,0.3);">
            <div style="font-size:2rem;">👆</div>
            <div style="font-size:0.88rem;">Tap to reveal</div>
          </div>
          <p class="slide-answer" id="slide-answer" style="opacity:${revealed ? 1 : 0}; transform:translateY(${revealed ? 0 : 10}px); transition:opacity 0.4s ease, transform 0.4s ease;">${esc(slide.answer)}</p>
        </div>
        ${photosHtml}
      </div>`;

    if (!revealed) {
      document.getElementById('slide-tap-area').addEventListener('click', () => {
        state.revealedSlides.add(slideIdx);
        const tr = document.getElementById('tap-reveal');
        if (tr) tr.style.display = 'none';
        const sa = document.getElementById('slide-answer');
        if (sa) { sa.style.opacity = '1'; sa.style.transform = 'translateY(0)'; }
        const sp = document.getElementById('slide-photos');
        if (sp) sp.style.opacity = '1';
      });
    }
  }
}

function renderDots() {
  const total = state.slides.length + 1; // +1 for cover
  const dots = document.getElementById('card-dots');
  dots.innerHTML = Array.from({ length: total }, (_, i) =>
    `<div class="card-dot${i === state.cardSlide ? ' active' : ''}" data-i="${i}"></div>`
  ).join('');
}

function setupCardNav() {
  const prev = document.getElementById('cn-prev');
  const next = document.getElementById('cn-next');
  const total = state.slides.length + 1;

  const update = () => {
    prev.disabled = state.cardSlide === 0;
    next.disabled = false;
    next.textContent = state.cardSlide === total - 1 ? 'Done \u2713' : 'Next \u2192';
    renderDots();
    renderCardSlide(state.cardSlide);
  };

  prev.addEventListener('click', () => { if (state.cardSlide > 0) { state.cardSlide--; update(); } });
  next.addEventListener('click', () => {
    if (state.cardSlide < total - 1) { state.cardSlide++; update(); }
    else { showToast("That's the whole card! \uD83D\uDC8C"); }
  });
  update();
}

// ── CARD VIEWER (from URL) ────────────────────────────────────────────────
function viewCard(card) {
  document.getElementById('progress-bar').style.display = 'none';
  switchScreen('screen-view');

  state.toName = card.toName;
  state.fromName = card.fromName;
  state.design = card.design || 'roses';
  state.slides = (card.slides || []).map(s => ({
    id: s.id, question: s.question, answer: s.answer, photos: s.photos || []
  }));
  state.cardSlide = 0;
  state.revealedSlides = new Set();

  renderCardSlide(0);
  renderDots();
  setupCardNav();

  document.getElementById('share-wrap').style.display = 'none';
}

// ── ROUTER ───────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  const cardParam = params.get('card');
  if (cardParam) {
    try {
      const json = decodeURIComponent(escape(atob(cardParam)));
      const card = JSON.parse(json);
      if (!card.slides || !card.toName) throw new Error('invalid');
      viewCard(card);
    } catch(e) {
      showError();
    }
  } else {
    state.step = -1;
    renderQuestion(-1);
  }
});

function showError() {
  document.getElementById('screen-questions').innerHTML = `
    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem; text-align:center;">
      <div style="font-size:3rem; margin-bottom:1rem;">💌</div>
      <h2 style="font-family:var(--font-serif); font-weight:400; font-size:1.6rem; color:#1a0e18; margin-bottom:0.5rem;">Card not found</h2>
      <p style="color:rgba(0,0,0,0.45); margin-bottom:1.5rem;">This link may have expired or the card doesn't exist yet.</p>
      <a href="?" style="padding:12px 28px; background:var(--pink); color:white; border-radius:50px; text-decoration:none; font-weight:500; font-family:var(--font-sans);">Make a new card →</a>
    </div>`;
}
</script>
